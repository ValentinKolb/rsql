name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test -race
        run: go test -race ./...

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The client e2e suite spawns the rsql server binary, so Go is required.
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      # Pre-fetch the Go module cache so the per-test `go build` does not
      # have to download modules and risk pipe-buffer pressure.
      - name: go mod download
        run: go mod download

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        working-directory: client
        run: bun install --frozen-lockfile

      - name: typecheck
        working-directory: client
        run: bunx tsc --noEmit

      - name: test
        working-directory: client
        run: bun test
